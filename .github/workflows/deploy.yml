name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /var/www/royalclinic

            echo "📦 Pulling latest changes..."
            git pull origin master

            echo "🔧 Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "⚙️  Caching config, routes & views..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🗃️  Running migrations..."
            php artisan migrate --force

            echo "🔗 Fixing storage symlink..."
            php artisan storage:link || true

            echo "🔑 Setting permissions..."
            chown -R www-data:www-data /var/www/royalclinic/storage /var/www/royalclinic/bootstrap/cache
            chmod -R 775 /var/www/royalclinic/storage /var/www/royalclinic/bootstrap/cache

            echo "♻️  Restarting PHP-FPM..."
            systemctl reload php8.3-fpm

            echo "✅ Deployment complete!"
