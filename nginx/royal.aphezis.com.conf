# ============================================================
# Royal Clinic — royal.aphezis.com
# Standalone vhost — does NOT affect other sites on this server
# Drop into: /etc/nginx/sites-available/royal.aphezis.com
# Enable:    ln -s /etc/nginx/sites-available/royal.aphezis.com \
#                   /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name royal.aphezis.com;

    root /var/www/royalclinic/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Dedicated log files — separate from all other apps on this server
    access_log /var/log/nginx/royal.aphezis.com.access.log;
    error_log  /var/log/nginx/royal.aphezis.com.error.log;
}
